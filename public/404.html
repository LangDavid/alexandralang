<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Alexandra Lang | Klinische Psychologin</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // Redirects all 404s to the root index.html, preserving the path in the query string.
      // See: https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/?/" +
          l.pathname.slice(1).replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
